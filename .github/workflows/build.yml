name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Test the pure engine
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build (Tauri release)
        run: npm run tauri build

      - name: Collect the portable + installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-portable | Out-Null
          Copy-Item src-tauri/target/release/quad.exe dist-portable/
          Copy-Item src-tauri/target/release/bundle/nsis/*-setup.exe dist-portable/ -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quad-windows
          path: dist-portable/*
          if-no-files-found: error

      - name: Publish rolling "latest" release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Quad — latest build from main
          prerelease: true
          files: dist-portable/*
