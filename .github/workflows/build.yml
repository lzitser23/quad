name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Test the pure engine
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build (Tauri release)
        run: npm run tauri build

      - name: Collect the portable + installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-portable | Out-Null
          Copy-Item src-tauri/target/release/quad.exe dist-portable/
          Copy-Item src-tauri/target/release/bundle/nsis/*-setup.exe dist-portable/ -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quad-windows
          path: dist-portable/*
          if-no-files-found: error

  mac:
    runs-on: macos-latest
    # "yes" once the Apple signing secrets are configured (see below). Until then the build is
    # ad-hoc signed and unsigned-notarized — it still produces a working DMG, just with the
    # Gatekeeper warning + per-build Accessibility re-prompt.
    env:
      SIGNED: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && 'yes' || 'no' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Test the pure engine
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # ---- Signing (only when the Apple secrets are present) --------------------------------
      # Import the Developer ID cert into a throwaway keychain so codesign can find it.
      - name: Import Apple signing certificate
        if: env.SIGNED == 'yes'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain
          rm "$RUNNER_TEMP/certificate.p12"

      # Expose the Apple ID notarization credentials — but only in the signed path, so unsigned
      # builds don't hand Tauri blank credentials.
      - name: Prepare notarization credentials
        if: env.SIGNED == 'yes'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          {
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Build (Tauri release, universal DMG)
        # Signs + notarizes with a stable Developer ID when the secrets are set (APPLE_ID /
        # APPLE_PASSWORD / APPLE_TEAM_ID come from the step above); otherwise ad-hoc ("-") with no
        # notarization — a working DMG that Gatekeeper warns about on first open.
        run: npm run tauri build -- --target universal-apple-darwin --bundles app,dmg
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}

      - name: Collect the DMG and the updater app bundle
        # The self-updater downloads the bare (signed) app bundle; it never gets
        # a quarantine attribute, so the zip needs no separate notarization.
        run: |
          mkdir -p dist-mac
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg dist-mac/
          ditto -c -k --keepParent "src-tauri/target/universal-apple-darwin/release/bundle/macos/Quad.app" dist-mac/quad-macos-universal.app.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quad-macos
          path: dist-mac/*
          if-no-files-found: error

  release:
    needs: [portable, mac]
    # Publish whatever built, even if one platform failed — so a macOS break can't hold up the
    # Windows release (and vice versa). Skipped only on cancellation or off-main builds.
    if: ${{ !cancelled() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      # The .sha256 sidecars are what the in-app updater verifies downloads
      # against; missing pieces are skipped so one platform's failure doesn't
      # block the other's release.
      - name: Generate updater checksums
        run: |
          if [ -f dist/quad-windows/quad.exe ]; then
            (cd dist/quad-windows && sha256sum quad.exe > quad.exe.sha256)
          fi
          if [ -f dist/quad-macos/quad-macos-universal.app.zip ]; then
            (cd dist/quad-macos && sha256sum quad-macos-universal.app.zip > quad-macos-universal.app.zip.sha256)
          fi

      - name: Publish rolling "latest" release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Quad — latest build from main
          prerelease: true
          files: dist/**/*

      # Versioned releases drive the in-app update check, which reads the
      # latest non-prerelease — the tag must match the tauri.conf.json version.
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Quad ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/**/*
